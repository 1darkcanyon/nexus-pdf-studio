<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#03030b"/>
  <rect width="512" height="512" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#060620"/>
      <stop offset="100%" stop-color="#03030b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Diamond gem -->
  <g transform="translate(256,180)" filter="url(#glow)">
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#00e5ff" stroke-width="8" transform="rotate(45)"/>
    <rect x="-38" y="-38" width="76" height="76" fill="#00e5ff" opacity="0.15" transform="rotate(45)"/>
    <rect x="-20" y="-20" width="40" height="40" fill="#00e5ff" opacity="0.35" transform="rotate(45)"/>
  </g>
  <!-- NEXUS text -->
  <text x="256" y="330" font-family="monospace" font-size="52" font-weight="700" fill="#00e5ff" text-anchor="middle" letter-spacing="8" opacity="0.95">NEXUS</text>
  <!-- PDF STUDIO text -->
  <text x="256" y="375" font-family="monospace" font-size="22" fill="#404068" text-anchor="middle" letter-spacing="5">PDF STUDIO</text>
  <!-- Glow line -->
  <line x1="80" y1="395" x2="432" y2="395" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <!-- Sub text -->
  <text x="256" y="430" font-family="monospace" font-size="16" fill="#1e1e44" text-anchor="middle" letter-spacing="3">kaneonexus.net</text>
</svg>
